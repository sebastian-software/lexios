# Minimal v0.4 Brand ID placeholder.
#
# This file exists so the demos under examples/react-brand-report* have
# something to parse and render while real brand records are being
# authored against the new schema. It is intentionally sparse: every
# optional field is either omitted or left empty so the renderers can
# be exercised on a real document without pretending to describe a
# real brand.
#
# Replace this file (or add siblings next to it) when ready.

