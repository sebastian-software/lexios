# GitLab — Brand ID record
#
# Source material: GitLab Handbook (CC BY-SA 4.0) and Pajamas Design System
# brand guidelines. Reconstructed from the publicly published mission, values,
# brand voice, and visual identity pages. See docs/brand-id/examples/gitlab.notes.md
# for source-to-field mapping.

