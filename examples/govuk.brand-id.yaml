  schema:
    id: brand-id
    version: 0.4.0
  brandName: GOV.UK
  brandSlug: govuk
  legalEntityName: Government Digital Service (GDS), UK Government
  canonicalDomain: gov.uk
  status: draft
  createdAt: "2026-04-22T00:00:00Z"
  updatedAt: "2026-04-22T00:00:00Z"
