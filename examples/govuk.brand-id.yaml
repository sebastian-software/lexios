# GOV.UK — Brand ID record
#
# Source material: publicly licensed under the Open Government Licence v3.0.
# This record reconstructs the brand from the published GOV.UK style guide,
# content design guide, and Design System. See docs/brand-id/examples/govuk.notes.md
# for the source-to-field mapping and the rationale behind each annotation.

